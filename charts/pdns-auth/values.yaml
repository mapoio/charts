## PowerDNS Auth Server配置
image:
  repository: powerdns/pdns-auth-49
  tag: latest
  pullPolicy: IfNotPresent

## 初始化Job配置
initJob:
  image:
    repository: flyway/flyway
    tag: 9-alpine
    pullPolicy: IfNotPresent

## 配置生成Job配置（已禁用：pdns.conf 由 Helm 直接渲染，敏感值通过 Secret 注入）
configJob:
  enabled: false
  image:
    repository: bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent

## 副本数量
replicaCount: 1

## 自定义标签，添加到所有资源
customLabels: {}
  # app.kubernetes.io/part-of: dns-system
  # environment: production

## 自定义Pod标签
podLabels: {}
  # role: dns-server
  # version: v1

## 部署策略配置
strategy:
  rollingUpdate:
    maxSurge: "25%"
    maxUnavailable: "25%"

## 资源限制
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

## 安全上下文
# securityContext:
#   runAsUser: 101
#   runAsGroup: 101
#   capabilities:
#     add:
#       - NET_BIND_SERVICE
#     drop:
#       - ALL

## 数据库配置
database:
  ## 数据库类型: mysql, pgsql, sqlite3
  type: mysql
  
  ## MySQL配置
  mysql:
    host: mysql
    port: 3306
    user: powerdns
    password: powerdns
    database: powerdns
    existingSecret: ""           # 生产环境：指向已有 Secret 名称，留空则由 chart 创建
    existingSecretPasswordKey: "PDNS_gmysql_password"

  ## PostgreSQL配置
  pgsql:
    host: postgresql
    port: 5432
    user: powerdns
    password: powerdns
    database: powerdns
    existingSecret: ""           # 生产环境：指向已有 Secret 名称，留空则由 chart 创建
    existingSecretPasswordKey: "PDNS_gpgsql_password"
    
  ## SQLite3配置
  sqlite3:
    database: /var/lib/powerdns/pdns.sqlite3
    
  ## 数据库初始化配置
  init:
    enabled: true
    skipCreate: false
    skipInit: false

## 认证配置（敏感，生产环境使用 existingSecret）
auth:
  apiKey: "changeme"                    # 本地开发默认值
  existingSecret: ""                    # 生产环境：指向已有 Secret，留空则由 chart 创建
  existingSecretApiKeyKey: "PDNS_api_key"

## PowerDNS配置（不含敏感值，api-key 已移入 auth 块）
## 所有配置写入 pdns.conf；api-key/db-password 通过 Deployment env 注入
config:
  api: "yes"
  webserver: "yes"
  webserver-address: "0.0.0.0"
  webserver-allow-from: "0.0.0.0/0,::/0"
  webserver-port: "8081"
  local-address: "0.0.0.0, ::"
  local-port: "53"
  log-dns-queries: "no"
  loglevel: "3"
  allow-axfr-ips: "127.0.0.0/8,::1/128"
  allow-notify-from: "0.0.0.0/0,::/0"
  daemon: "no"
  disable-axfr: "no"
  guardian: "yes"
  default-ttl: "3600"
  receiver-threads: "1"
  distributor-threads: "3"

## 服务配置
service:
  type: ClusterIP
  port: 53
  apiPort: 8081
  annotations: {}
  loadBalancerIP: ""
  externalTrafficPolicy: ""

## 持久卷配置（用于SQLite3）
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

## 健康检查配置
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

## Pod注解
podAnnotations: {}

## 节点选择器
nodeSelector: {}

## 容忍度
tolerations: []

## 亲和性
affinity: {}

## ServiceAccount配置
serviceAccount:
  create: true
  annotations: {}
  name: ""

## Pod安全策略
podSecurityContext: {}

## 网络策略
networkPolicy:
  enabled: false

## 入口配置
ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: pdns-api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: [] 