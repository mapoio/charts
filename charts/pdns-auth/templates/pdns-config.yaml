apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pdns-auth.fullname" . }}-pdns-config
  labels:
    {{- include "pdns-auth.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-7"
data:
  pdns.conf: |
    # Generated by Helm — api-key and db password injected via PDNS_* env vars
    launch = g{{ .Values.database.type }}
    {{- range $key, $value := .Values.config }}
    {{ $key }} = {{ $value }}
    {{- end }}
    {{- if eq .Values.database.type "mysql" }}
    gmysql-host = {{ .Values.database.mysql.host }}
    gmysql-port = {{ .Values.database.mysql.port }}
    gmysql-user = {{ .Values.database.mysql.user }}
    gmysql-dbname = {{ .Values.database.mysql.database }}
    {{- else if eq .Values.database.type "pgsql" }}
    gpgsql-host = {{ .Values.database.pgsql.host }}
    gpgsql-port = {{ .Values.database.pgsql.port }}
    gpgsql-user = {{ .Values.database.pgsql.user }}
    gpgsql-dbname = {{ .Values.database.pgsql.database }}
    {{- else if eq .Values.database.type "sqlite3" }}
    gsqlite3-database = {{ .Values.database.sqlite3.database }}
    {{- end }}
